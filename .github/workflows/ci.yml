name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # Stage 1: Lint
      - name: Lint
        run: npm run lint

      # Stage 2: Type check
      - name: Typecheck
        run: npx tsc --noEmit

      # Stage 3: Unit tests with coverage (integration tests excluded — require live DB)
      - name: Unit tests
        run: npx vitest run --coverage --exclude='**/*.integration.test.ts'
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost/placeholder
