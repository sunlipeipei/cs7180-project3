# BypassHire — CI/CD Pipeline
#
# Stages (in dependency order):
#   lint ──────────────────────────────────────────────────────┐
#   typecheck ─────────────────────────────────────────────────┤
#   unit-test (+ coverage comment) ────────────────────────────┼─→ build ─→ e2e ─→ deploy-production (main)
#   integration-tests (Neon, skipIf no secret) ─────────────────┤       └──→ deploy-preview (PR)
#   security (npm audit + CodeQL) ─────────────────────────────┘

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch/PR on new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Bumped to 22 for Phase 1.A: unpdf's pdfjs bundle calls Promise.try(),
  # which first landed in Node 22. Node 20 throws TypeError on import.
  NODE_VERSION: '22'
  # Used by integration-test and e2e jobs (postgres service on localhost).
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bypasshire_test
  # Used by unit-test and build jobs — satisfies Prisma's URL parser without
  # opening a real connection (unit tests mock the prisma singleton).
  PLACEHOLDER_DATABASE_URL: postgresql://placeholder:placeholder@localhost/placeholder

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Stage 1: Lint — ESLint + Prettier
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint + Prettier)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 2: Type check
  # ────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 3a: Unit tests with coverage
  # Integration tests (*.integration.test.ts) are excluded — they need a real DB.
  # Coverage summary is posted as a PR comment.
  # ────────────────────────────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests with coverage
        run: |
          npx vitest run \
            --coverage \
            --coverage.reporter=json \
            --coverage.reporter=json-summary \
            --coverage.reporter=text \
            --exclude "**/*.integration.test.ts"
        env:
          DATABASE_URL: ${{ env.PLACEHOLDER_DATABASE_URL }}

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vite-config-path: vitest.config.ts

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 3b: Integration tests — *.integration.test.ts tier against Neon
  # Activated when the DATABASE_URL_TEST secret is provisioned.
  # Skips gracefully (exit 0) when the secret is absent so CI stays green
  # until Neon is set up (Issue #48).
  # ────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Neon)
    runs-on: ubuntu-latest
    needs: unit-test

    env:
      DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run integration tests (Neon)
        if: ${{ env.DATABASE_URL_TEST != '' }}
        run: npm run test:integration
        env:
          DATABASE_URL: ${{ env.PLACEHOLDER_DATABASE_URL }}
          DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}

      - name: Skip — DATABASE_URL_TEST not provisioned
        if: ${{ env.DATABASE_URL_TEST == '' }}
        run: echo "DATABASE_URL_TEST secret is not set — integration tests skipped. Provision a Neon branch and add the secret to activate this tier."

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 4: Security — npm audit + GitHub CodeQL
  # Fails the build on high or critical npm vulnerabilities.
  # CodeQL results appear in the Security tab → Code scanning alerts.
  # ────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          config: |
            paths:
              - src
              - app
            paths-ignore:
              - src/generated
              - node_modules
              - .next

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 5: Build — all quality gates must pass first
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-test, integration-tests, security]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # npm run build = prisma generate && next build (see package.json)
      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          DATABASE_URL: ${{ env.PLACEHOLDER_DATABASE_URL }}

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 6: E2E tests — Playwright against a running Next.js server
  # --pass-with-no-tests allows the stage to succeed when e2e/ has no tests yet
  # (tests will be added in Issue #26).
  # ────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bypasshire_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bypasshire_e2e
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client and apply schema
        run: npx prisma generate && npx prisma migrate deploy

      # Run the E2E target against `next dev` so Clerk's dev-auth bypass is
      # available without baking a production-mode override into the auth
      # code. Dev server + DEV_AUTH_BYPASS=1 lets Playwright load /profile
      # without a real sign-in; specs stub /api/profile* at the Playwright
      # router so the real AI / DB are never hit.
      - name: Start Next.js dev server (with auth bypass for E2E)
        run: npm run dev &
        env:
          PORT: 3000
          NODE_ENV: development
          DEV_AUTH_BYPASS: '1'
          DEV_USER_ID: e2e_user
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run Playwright E2E tests
        run: npx playwright test --pass-with-no-tests
        env:
          DEV_AUTH_BYPASS: '1'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 7: Preview deploy — Vercel preview on every PR
  # Posts preview URL as a PR comment (updates on re-push, never duplicates).
  # ────────────────────────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview (Vercel)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build via Vercel CLI
        run: vercel build --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Post preview URL on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Vercel Preview Deployment

            | | |
            |---|---|
            | **Preview URL** | ${{ steps.deploy.outputs.url }} |
            | **Commit** | `${{ github.sha }}` |
            | **Branch** | `${{ github.head_ref }}` |
          edit-mode: replace
          body-includes: 'Vercel Preview Deployment'

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 8: Production deploy — only on merge to main, after E2E passes
  # ────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy Production (Vercel)
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build via Vercel CLI
        run: vercel build --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
